phenomenon: genitivo_partitivo
rule_type: morphological
source: "Allen & Greenough §346"
translation_template: '"of [noun]" or "among [noun]". Triggered by a head expressing a part/quantity (superlative, comparative, indefinite pronoun, numeral, pars/numerus/copia). If no such head exists, the genitive is more likely possessive or objective, not partitive.'
description: |
  Genitive expressing the whole of which a part is taken. It appears
  after: indefinite pronouns and adjectives (nemo, aliquis, multi,
  pauci...), numerals, comparatives and superlatives, nouns of quantity
  or number (pars, numerus, copia, multitudo).
  In English: "of + noun" or "among + noun".
pattern:
  type: ud_pattern
  match_any:
    - { upos: NOUN, Case: Gen }
    - { upos: PRON, Case: Gen }
examples:
  - lat: "Fortissimi Gallorum sunt Belgae"
    eng: "The bravest of the Gauls are the Belgae"
    note: "Gallorum = partitive genitive after a superlative"
  - lat: "Nemo nostrum"
    eng: "None of us"
    note: "Nostrum = partitive genitive of the pronoun"
