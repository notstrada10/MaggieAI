phenomenon: ablativo_assoluto
rule_type: syntactic
source: "Allen & Greenough §419"
translation_template: '"with X V-ing" / "after X had been V-ed" / "since/while/although X V-ed" — pick the temporal-causal nuance from context. Never use "with" mechanically; choose the connector that fits the discourse.'
description: |
  A participial construction in Latin made up of a noun (or pronoun) and a
  participle, both in the ablative, syntactically independent of the main
  clause. It expresses a circumstance (temporal, causal, concessive, or
  conditional) of the governing verb.
  In English it is rendered with: a subordinate clause ("After Caesar had
  given the order"), a present participle ("Caesar commanding"), a
  nominative absolute ("Caesar in command"), or a "with" phrase
  ("with Caesar in command").
pattern:
  type: ud_pattern
  match_any:
    - { upos: VERB, VerbForm: Part, Case: Abl }
    - { upos: AUX, VerbForm: Part, Case: Abl }
examples:
  - lat: "Caesare imperante, Galli rebellaverunt"
    eng: "With Caesar in command, the Gauls rebelled"
    note: "Present active participle (imperante) in the ablative agrees with Caesare in the ablative."
  - lat: "Tarquinio expulso, Romani consules creaverunt"
    eng: "After Tarquin had been expelled, the Romans elected consuls"
    note: "Perfect passive participle (expulso)"
