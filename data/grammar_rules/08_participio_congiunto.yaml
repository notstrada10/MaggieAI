phenomenon: participio_congiunto
rule_type: syntactic
source: "Allen & Greenough §494"
description: |
  Participio (presente, perfetto o futuro) che concorda in caso, genere e
  numero con un sostantivo o pronome della proposizione reggente.
  Esprime una circostanza relativa al sostantivo a cui si riferisce.
  Distinzione dall'ablativo assoluto: qui il participio NON è in
  ablativo "assoluto" ma legato sintatticamente a un elemento della
  reggente.
  In italiano: relativa esplicita, gerundio, o subordinata circostanziale.
pattern:
  type: ud_pattern
  match_any:
    - { upos: VERB, VerbForm: Part }
examples:
  - lat: "Caesar Galliam ingressus hostes vicit"
    ita: "Cesare, entrato in Gallia (= dopo essere entrato), sconfisse i nemici"
    note: "Ingressus concorda con Caesar (Nom)"
  - lat: "Vidi puerum currentem"
    ita: "Vidi il ragazzo che correva (mentre correva)"
    note: "Currentem concorda con puerum (Acc)"
