phenomenon: participio_congiunto
rule_type: syntactic
source: "Allen & Greenough §494"
translation_template: 'Relative clause ("who V-s/V-ed", "which V-s/V-ed") OR "having V-ed" OR a temporal subordinate ("after/while V-ing"). The participle agrees with a noun/pronoun in the main clause — always identify the head noun before translating. Different from ablative absolute: here the participle is NOT in an absolute ablative pair.'
description: |
  A participle (present, perfect, or future) that agrees in case, gender,
  and number with a noun or pronoun in the main clause. It expresses a
  circumstance bearing on the noun it modifies.
  Distinguished from the ablative absolute: here the participle is NOT in
  an "absolute" ablative but is syntactically tied to an element of the
  main clause.
  In English: a relative clause, a present participle, or a circumstantial
  subordinate clause.
pattern:
  type: ud_pattern
  match_any:
    - { upos: VERB, VerbForm: Part }
examples:
  - lat: "Caesar Galliam ingressus hostes vicit"
    eng: "Caesar, having entered Gaul (= after entering), defeated the enemy"
    note: "Ingressus agrees with Caesar (Nom)"
  - lat: "Vidi puerum currentem"
    eng: "I saw the boy running (while he was running)"
    note: "Currentem agrees with puerum (Acc)"
