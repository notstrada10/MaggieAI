phenomenon: accusativo_con_infinito
rule_type: syntactic
source: "Allen & Greenough §580"
translation_template: '"[main-verb] that [accusative-noun = subject] [infinitive → finite verb]". Tense of the infinitive maps to: present infinitive = same time as main verb; perfect = before; future = after. For sense verbs (audio, video, sentio) the accusative-and-infinitive may be preserved: "I heard him come".'
description: |
  Construction (ACI) used in Latin as the object of verbs of saying,
  thinking, perceiving, and feeling (verba dicendi, sentiendi, voluntatis).
  The subject of the subordinate clause goes into the accusative; the
  verb goes into the infinitive (present, perfect, or future).
  In English it is rendered with a finite "that-clause" ("I say that
  Caesar is coming") or, for some verbs of perception, with the
  accusative-and-infinitive structure preserved ("I heard him come").
pattern:
  type: ud_pattern
  match_any:
    - { upos: VERB, VerbForm: Inf }
examples:
  - lat: "Dico Caesarem venire"
    eng: "I say that Caesar is coming"
    note: "Caesarem = subject in the accusative; venire = present infinitive"
  - lat: "Audivi Romam captam esse"
    eng: "I heard that Rome had been captured"
    note: "Perfect passive infinitive"
