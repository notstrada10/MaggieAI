phenomenon: ut_finale
rule_type: syntactic
source: "Allen & Greenough §531"
description: |
  Final (purpose) clause introduced by `ut` (negative: `ne`) with the
  verb in the present or imperfect subjunctive.
  In English: "(in order) to + infinitive" or "so that + finite verb
  (may/might)".
  The tense follows the sequence-of-tenses rule: a primary tense in the
  main clause → present subjunctive; a secondary tense in the main clause
  → imperfect subjunctive.
pattern:
  type: ud_pattern
  match_any:
    - { upos: VERB, Mood: Sub }
    - { upos: AUX, Mood: Sub }
examples:
  - lat: "Veni ut te viderem"
    eng: "I came (in order) to see you / so that I might see you"
    note: "ut + imperfect subjunctive = past purpose"
  - lat: "Pugnant ne servi fiant"
    eng: "They fight so that they may not become slaves"
    note: "Negative purpose with `ne`"
