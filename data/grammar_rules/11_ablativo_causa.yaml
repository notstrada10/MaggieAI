phenomenon: ablativo_di_causa
rule_type: morphological
source: "Allen & Greenough §404"
description: |
  Ablative (bare or preceded by `prae`, `propter`, `ob`) expressing the
  cause of an action or state. Common with verbs of emotion (gaudere,
  dolere, laetari) and in expressions like "to die of X" or "to tremble
  at X".
  In English: "because of + noun", "out of + noun", or "for + noun".
pattern:
  type: ud_pattern
  match_any:
    - { upos: NOUN, Case: Abl }
examples:
  - lat: "Gaudeo victoria"
    eng: "I rejoice over the victory"
    note: "Victoria = ablative of cause with a verb of emotion"
  - lat: "Prae timore fugit"
    eng: "He fled out of fear"
    note: "Prae + ablative = more explicit cause"
