phenomenon: perifrastica_attiva
rule_type: syntactic
source: "Allen & Greenough §195"
description: |
  Construction made up of the future active participle (suffix -urus,
  -ura, -urum) + a form of `esse`. It expresses intention, imminence,
  or willingness to perform the action.
  In English: "be about to + infinitive", "be on the point of + gerund",
  or "intend to + infinitive".
pattern:
  type: ud_pattern
  # KNOWN LIMITATION: CLTK Stanza ittb mis-tags future active participles
  # inconsistently. `Morituri` came back as Aspect=Perf+Voice=Act
  # (correct), but `pugnaturus` came back as Aspect=Perf+Voice=Pass
  # (wrong — same -urus suffix, model is unreliable). The pattern below
  # matches the correctly-tagged subset; mistagged forms slip through
  # detection and rely on the LLM identifying them from the morpho
  # table. See blueprint §"Grammar rules = per-token matchers".
  #
  # The pattern over-matches on perfect active deponent participles
  # (e.g. `locutus`, `profectus`) — accepted, the LLM disambiguates.
  match_any:
    - { upos: VERB, VerbForm: Part, Aspect: Perf, Voice: Act }
examples:
  - lat: "Caesar pugnaturus est"
    eng: "Caesar is about to fight / intends to fight"
    note: "Pugnaturus = future active participle + est"
  - lat: "Morituri te salutant"
    eng: "Those who are about to die salute you"
    note: "Future active participle used as a substantive"
