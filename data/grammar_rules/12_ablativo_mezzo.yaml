phenomenon: ablativo_di_mezzo
rule_type: morphological
source: "Allen & Greenough §409"
description: |
  Instrumental ablative (without a preposition) expressing the means,
  instrument, or concrete manner with which an action is carried out.
  Important distinction: an animate agent takes `a/ab + ablative`
  (ablative of agent), whereas an inanimate means is the bare ablative.
  In English: "with + noun" or "by means of + noun".
pattern:
  type: ud_pattern
  match_any:
    - { upos: NOUN, Case: Abl }
examples:
  - lat: "Gladio pugnat"
    eng: "He fights with a sword"
    note: "Gladio = instrumental ablative"
  - lat: "Manibus capere"
    eng: "To take with one's hands"
    note: "Manibus = plural instrumental ablative"
