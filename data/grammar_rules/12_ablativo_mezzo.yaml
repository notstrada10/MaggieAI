phenomenon: ablativo_di_mezzo
rule_type: morphological
source: "Allen & Greenough §409"
description: |
  Ablativo strumentale (senza preposizione) che indica il mezzo, lo
  strumento o il modo concreto con cui si compie un'azione.
  Distinzione importante: l'agente animato vuole `a/ab + ablativo`
  (ablativo d'agente), mentre il mezzo inanimato è ablativo semplice.
  In italiano: "con + nome" o "per mezzo di + nome".
pattern:
  type: ud_pattern
  match_any:
    - { upos: NOUN, Case: Abl }
examples:
  - lat: "Gladio pugnat"
    ita: "Combatte con la spada"
    note: "Gladio = abl. di mezzo (strumento)"
  - lat: "Manibus capere"
    ita: "Prendere con le mani"
    note: "Manibus = abl. plurale strumentale"
