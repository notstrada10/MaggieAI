phenomenon: cum_narrativo
rule_type: syntactic
source: "Allen & Greenough §546"
translation_template: '"when/since/although [past finite verb]". Pluperfect subjunctive (Tense=Pqp) = anteriority → "when/after X had V-ed". Imperfect subjunctive (Aspect=Imp) = contemporaneity → "while/when X was V-ing". Pick the connector (when vs since vs although) from context.'
description: |
  Construction characteristic of historical narrative: `cum` + imperfect
  subjunctive (contemporaneous action) or pluperfect subjunctive (anterior
  action). It expresses the circumstance (temporal, causal, or concessive)
  in which the main action takes place.
  In English: "when / since / although + finite verb", depending on the
  nuance.
  Distinguished from temporal-iterative `cum` (`cum` + indicative).
pattern:
  type: ud_pattern
  # The imperfect subjunctive in Latin UD is encoded as Aspect=Imp
  # (with Tense=Past). UD has no Tense=Imp value for Latin — that was
  # the original bug here. The pluperfect subjunctive is encoded
  # straight as Tense=Pqp (Aspect=Perf). Both verified empirically
  # against the CLTK Latin pipeline (Stanza ittb treebank).
  match_any:
    - { upos: VERB, Mood: Sub, Aspect: Imp }
    - { upos: VERB, Mood: Sub, Tense: Pqp }
examples:
  - lat: "Caesar cum in Galliam venisset, hostes vicit"
    eng: "When Caesar had reached Gaul (since he had reached Gaul), he defeated the enemy"
    note: "Cum + pluperfect subjunctive = anteriority"
  - lat: "Cum legeret, intravit amicus"
    eng: "While he was reading, his friend came in"
    note: "Cum + imperfect subjunctive = contemporaneity"
