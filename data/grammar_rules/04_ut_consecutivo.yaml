phenomenon: ut_consecutivo
rule_type: syntactic
source: "Allen & Greenough §537"
description: |
  Proposizione consecutiva (di conseguenza) introdotta da `ut`
  (negativa: `ut non`), spesso anticipata da `tam`, `tantus`, `ita`,
  `sic`, `adeo` nella reggente. Verbo al congiuntivo. Si traduce con
  "così ... che + indicativo" o "tanto ... che + indicativo".
  Distinzione da `ut_finale`: la consecutiva è preceduta da
  intensificatori e conserva la sequenza dei tempi più libera.
pattern:
  type: ud_pattern
  match_any:
    - { upos: VERB, Mood: Sub }
examples:
  - lat: "Tantus erat clamor ut nihil audiri posset"
    ita: "Il clamore era così grande che nulla si poteva udire"
    note: "Tantus anticipa la consecutiva"
  - lat: "Sic loquitur ut omnes admirentur"
    ita: "Parla in modo tale che tutti lo ammirano"
    note: "Sic come anticipatore"
