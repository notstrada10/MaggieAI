phenomenon: ut_consecutivo
rule_type: syntactic
source: "Allen & Greenough §537"
description: |
  Result clause (consequence) introduced by `ut` (negative: `ut non`),
  often anticipated by `tam`, `tantus`, `ita`, `sic`, `adeo` in the main
  clause. The verb is in the subjunctive.
  In English: "so ... that + finite verb" or "such ... that + finite
  verb".
  Distinguished from `ut_finale`: result clauses are signalled by an
  intensifier and follow a freer tense sequence.
pattern:
  type: ud_pattern
  match_any:
    - { upos: VERB, Mood: Sub }
examples:
  - lat: "Tantus erat clamor ut nihil audiri posset"
    eng: "The shouting was so loud that nothing could be heard"
    note: "Tantus anticipates the result clause"
  - lat: "Sic loquitur ut omnes admirentur"
    eng: "He speaks in such a way that everyone admires him"
    note: "Sic as an anticipator"
