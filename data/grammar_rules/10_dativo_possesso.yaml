phenomenon: dativo_possesso
rule_type: morphological
source: "Allen & Greenough §373"
description: |
  Costruzione `est + dativo + nominativo` per esprimere il possesso.
  Il possessore va in dativo, la cosa posseduta in nominativo come
  soggetto di `esse`. In italiano si traduce inversamente con
  "avere": "Mihi est liber" → "Io ho un libro".
  Sfumatura rispetto a `habeo + accusativo`: enfatizza l'esistenza
  della cosa più che l'atto di possesso.
pattern:
  type: ud_pattern
  match_any:
    - { upos: PRON, Case: Dat }
    - { upos: NOUN, Case: Dat }
examples:
  - lat: "Mihi est liber"
    ita: "Io ho un libro (lett. a me è un libro)"
    note: "Mihi = dat. di possesso, liber = sogg. nom."
  - lat: "Caesari magna auctoritas erat"
    ita: "Cesare aveva grande autorità"
    note: "Caesari = dat. di possesso"
