phenomenon: dativo_possesso
rule_type: morphological
source: "Allen & Greenough §373"
description: |
  Construction `est + dative + nominative` to express possession. The
  possessor goes into the dative; the thing possessed goes into the
  nominative as the subject of `esse`.
  In English the relationship inverts to "have": "Mihi est liber" → "I
  have a book".
  Nuance versus `habeo + accusative`: emphasises the existence of the
  thing more than the act of possessing it.
pattern:
  type: ud_pattern
  match_any:
    - { upos: PRON, Case: Dat }
    - { upos: NOUN, Case: Dat }
examples:
  - lat: "Mihi est liber"
    eng: "I have a book (lit. there is a book to me)"
    note: "Mihi = dative of possession, liber = nominative subject"
  - lat: "Caesari magna auctoritas erat"
    eng: "Caesar had great authority"
    note: "Caesari = dative of possession"
