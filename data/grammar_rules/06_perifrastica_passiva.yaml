phenomenon: perifrastica_passiva
rule_type: syntactic
source: "Allen & Greenough §500"
translation_template: '"must be V-ed" / "is to be V-ed" / "has to be V-ed". A noun in the dative associated with the gerundive is the agent → "by [agent]". Carries obligation/necessity, not simple futurity.'
description: |
  Construction made up of the gerundive (future passive participle,
  suffix -ndus, -nda, -ndum) + a form of `esse`. It expresses necessity
  or obligation. The agent goes into the dative (dativus auctoris).
  In English: "must be + past participle", "is to be + past participle",
  or "needs to be + past participle".
pattern:
  type: ud_pattern
  # Canonical UD-Latin tags the gerundive as VerbForm=Gdv, but the
  # CLTK Stanza ittb model encodes it instead as
  # VerbForm=Part + Aspect=prospective + Voice=Pass. Verified empirically
  # against `delenda` and `legendus`. We accept both encodings: the
  # canonical form (for forward compatibility with other Latin treebanks)
  # and the actual CLTK form. The "prospective" aspect value is
  # CLTK-specific — it has no entry in the UD value normalizer, so it
  # passes through verbatim.
  match_any:
    - { upos: VERB, VerbForm: Gdv }
    - { upos: ADJ, VerbForm: Gdv }
    - { upos: VERB, VerbForm: Part, Aspect: prospective }
examples:
  - lat: "Carthago delenda est"
    eng: "Carthage must be destroyed"
    note: "Gerundive (delenda) + est"
  - lat: "Mihi liber legendus est"
    eng: "The book must be read by me / I have to read the book"
    note: "Mihi = dative of agent"
