phenomenon: perifrastica_passiva
rule_type: syntactic
source: "Allen & Greenough §500"
description: |
  Construction made up of the gerundive (future passive participle,
  suffix -ndus, -nda, -ndum) + a form of `esse`. It expresses necessity
  or obligation. The agent goes into the dative (dativus auctoris).
  In English: "must be + past participle", "is to be + past participle",
  or "needs to be + past participle".
pattern:
  type: ud_pattern
  match_any:
    - { upos: VERB, VerbForm: Gdv }
    - { upos: ADJ, VerbForm: Gdv }
examples:
  - lat: "Carthago delenda est"
    eng: "Carthage must be destroyed"
    note: "Gerundive (delenda) + est"
  - lat: "Mihi liber legendus est"
    eng: "The book must be read by me / I have to read the book"
    note: "Mihi = dative of agent"
